<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxd.io | Classroom 24k</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header onclick="location.href='index.html'">
        <h1>Classroom 24k</h1>
    </header>

    <nav></nav>

    <div class="container">
        <h1 class="game-title-header">Bloxd.io</h1>

        <div id="game-container"></div>

        <button class="fullscreen-btn" onclick="openFullscreen()">
            ⛶ Fullscreen Mode
        </button>

        <div class="info-box">
            <h2>About the Game</h2>
            <p>
                Bloxd.io is a massive multiplayer parkour and building game. An adventure themed minecraft style game, it is entertaining for everyone
         
            </p>
            
            <h3>Controls</h3>
            <ul style="list-style: none; padding: 0;">
                <li><strong>WASD:</strong> Movement</li>
                <li><strong>Spacebar:</strong> Jump</li>
                <li><strong>Shift:</strong> Sprint</li>
                <li><strong>C:</strong> Crouch</li>
                <li><strong>B / E:</strong> Shop & Inventory</li>
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
    
    <script>
    // Direct link is required because Bloxd.io blocks proxies/iframes from other domains
    setupGame("https://unblockedbloxd.us/");
</script>

</body>
</html>

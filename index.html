<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom 24k | Unblocked Games</title>
    <style>
        body {
            background-color: #000b1a;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(135deg, #0077ff 0%, #003366 100%);
            padding: 50px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border-bottom: 4px solid #00d4ff;
        }

        header h1 {
            margin: 0;
            font-size: 3.5rem;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 15px #00d4ff;
        }

        header p {
            font-size: 1.2rem;
            color: #00d4ff;
            font-weight: bold;
            margin-top: 10px;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .game-card {
            background: #001f3f;
            border-radius: 15px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 2px solid #004080;
            text-decoration: none;
            display: block;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4);
            border-color: #00d4ff;
        }

        .game-img {
            width: 100%;
            height: 160px;
            background: #002b5c;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border-bottom: 2px solid #004080;
        }

        .game-info {
            padding: 20px;
            text-align: center;
        }

        .game-info h3 {
            margin: 0;
            font-size: 1.4rem;
            color: #00d4ff;
            text-transform: uppercase;
        }

        footer {
            text-align: center;
            padding: 50px;
            color: #0077ff;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <h1>CLASSROOM 24K</h1>
        <p>THE BLUE ZONE - UNBLOCKED</p>
    </header>

    <div class="container">
        <div class="game-grid">

            <a href="bumper-cars-soccer.html" class="game-card">
                <div class="game-img">🏎️</div>
                <div class="game-info">
                    <h3>Bumper Cars Soccer</h3>
                </div>
            </a>

            </div>
    </div>

    <footer>
        &copy; 2026 Classroom 24k | Built for Speed
    </footer>

</body>
</html>

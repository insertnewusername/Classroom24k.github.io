<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom 24k | Unblocked Games</title>
    <style>
        /* Modern Gaming Theme */
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(135deg, #00ff88 0%, #00bd65 100%);
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        header h1 {
            margin: 0;
            font-size: 3rem;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* The Game Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        /* Individual Game Card */
        .game-card {
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #333;
            text-decoration: none;
            color: white;
            display: block;
        }

        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 255, 136, 0.3);
            border-color: #00ff88;
        }

        .game-img {
            width: 100%;
            height: 150px;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #666;
            /* Once you have images, replace the background with an actual image */
            background-image: linear-gradient(45deg, #222, #333);
        }

        .game-info {
            padding: 15px;
            text-align: center;
        }

        .game-info h3 {
            margin: 0;
            font-size: 1.2rem;
            color: #00ff88;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>CLASSROOM 24K</h1>
        <p style="color: #000; font-weight: bold;">The Ultimate Unblocked Hub</p>
    </header>

    <div class="container">
        <div class="game-grid">

            <a href="bumper-cars-soccer.html" class="game-card">
                <div class="game-img">🏎️ SOCCER</div>
                <div class="game-info">
                    <h3>Bumper Cars Soccer</h3>
                </div>
            </a>

            <a href="#" class="game-card">
                <div class="game-img">🕹️ COMING SOON</div>
                <div class="game-info">
                    <h3>More Games...</h3>
                </div>
            </a>

        </div>
    </div>

    <footer>
        &copy; 2026 Classroom 24k - Hosted on GitHub Pages
    </footer>

</body>
</html>

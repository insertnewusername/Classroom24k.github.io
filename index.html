<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom 24k | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header onclick="location.href='index.html'"><h1>Classroom 24k</h1></header>
    <nav></nav>

    <div class="container">
        <a href="bloxd-io.html" style="text-decoration: none;">
            <div class="featured-banner">
                <div class="featured-overlay">
                    <h2>Bloxd.io</h2>
                    <p>The ultimate multiplayer survival and creative experience.</p>
                    <div class="fullscreen-btn" style="margin: 0; padding: 10px 25px;">Play Now</div>
                </div>
            </div>
        </a>

        <div class="carousel-container">
            <h2 class="carousel-title">Trending Now</h2>
            <div class="carousel-wrapper">
                <button class="scroll-btn left-btn" onclick="scrollCarousel(this, -1)">&#10094;</button>
                <div class="carousel-track">
                    <a href="bloxd-io.html" class="game-card">
                        <div class="game-img-container"><img src="https://cdn2.spatial.io/assets/v1/static/external_games/bloxd-io.jpeg"></div>
                        <div class="game-info"><h3>Bloxd.io</h3></div>
                    </a>
                    <a href="bumper-cars-soccer.html" class="game-card">
                        <div class="game-img-container"><img src="https://abinbins.github.io/thumb/bumper-cars-soccer.png"></div>
                        <div class="game-info"><h3>Bumper Cars</h3></div>
                    </a>
                    </div>
                <button class="scroll-btn right-btn" onclick="scrollCarousel(this, 1)">&#10095;</button>
            </div>
        </div>

        <div class="carousel-container">
            <h2 class="carousel-title">Driving & Action</h2>
            <div class="carousel-wrapper">
                <button class="scroll-btn left-btn" onclick="scrollCarousel(this, -1)">&#10094;</button>
                <div class="carousel-track">
                    <a href="bumper-cars-soccer.html" class="game-card">
                        <div class="game-img-container"><img src="https://abinbins.github.io/thumb/bumper-cars-soccer.png"></div>
                        <div class="game-info"><h3>Bumper Cars</h3></div>
                    </a>
                    </div>
                <button class="scroll-btn right-btn" onclick="scrollCarousel(this, 1)">&#10095;</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

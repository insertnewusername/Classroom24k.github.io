<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rowdy Wrestling | Classroom 24k</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header onclick="location.href='index.html'">
        <h1>Classroom 24k</h1>
    </header>

    <nav></nav>

    <div class="container">
        <h2 class="game-page-title">Rowdy Wrestling</h2>

        <div id="game-container"></div>

        <button class="fullscreen-btn" onclick="openFullscreen()">
            ⛶ Fullscreen Mode
        </button>

        <div class="about-section">
            <div class="about-content">
                <h2>About the Game</h2>
                <p>
                    Rowdy Wrestling is a fun wrestling game to play. Choose a character to fight as and fight other brawlers. 
Punch and kick others all the way to the top of the ladder.
                </p>
                
                <h3 style="color: #00aaff; margin-top: 20px;">Controls</h3>
                <ul style="list-style: none; padding: 0; line-height: 1.8;">
                    <li><strong>WASD:</strong> Movement</li>
                    <li><strong>Z:</strong> Punch</li>
                    <li><strong>Up Arrow + Z:</strong> Dropkick</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    
    <script>
        setupGame("https://abinbins.github.io/a6/rowdy-wrestling");
    </script>

</body>
</html>
